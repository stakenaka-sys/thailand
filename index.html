<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="タイ旅行">
<meta name="theme-color" content="#F5EFE6">
<title>タイ旅行 2026.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5EFE6;
    --card: #FFFFFF;
    --ink: #1A1814;
    --ink-soft: #6B655B;
    --ink-faint: #A39D90;
    --line: #E8E0D2;
    --accent: #2C5F5D;
    --gold: #B8924A;
    --gold-soft: #FFF4DC;
    --warning: #C45A3F;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg); color: var(--ink);
    font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    font-size: 16px; line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: contain;
  }
  .app { max-width: 520px; margin: 0 auto; min-height: 100vh; background: var(--bg); padding-bottom: 80px; }
  
  header { padding: 28px 24px 14px; text-align: center; background: var(--bg); position: sticky; top: 0; z-index: 10; }
  header::after { content: ''; display: block; width: 24px; height: 1px; background: var(--gold); margin: 14px auto 0; }
  .trip-name { font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 500; letter-spacing: 0.08em; color: var(--ink); margin-bottom: 4px; }
  .trip-sub { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.2em; text-transform: uppercase; }
  
  .tabs-wrap { background: var(--bg); position: sticky; top: 110px; z-index: 9; padding: 8px 0; border-bottom: 1px solid var(--line); }
  .tabs { display: flex; gap: 8px; padding: 4px 24px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 8px 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--card); color: var(--ink-soft); font-size: 11px; cursor: pointer; transition: all 0.2s; min-width: 58px; text-align: center; font-family: inherit; }
  .tab.active { background: var(--ink); color: white; border-color: var(--ink); }
  .tab.today:not(.active) { border-color: var(--gold); background: var(--gold-soft); }
  .tab-num { display: block; font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 700; line-height: 1.1; }
  .tab-week { display: block; font-size: 10px; margin-top: 2px; opacity: 0.85; }
  
  .day { display: none; padding: 24px 24px 0; animation: fadeIn 0.3s ease; }
  .day.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  
  .day-head { margin-bottom: 24px; }
  .day-date { font-family: 'Shippori Mincho', serif; font-size: 42px; font-weight: 500; line-height: 1; color: var(--ink); margin-bottom: 8px; }
  .day-date small { font-size: 18px; color: var(--ink-faint); font-weight: 500; margin-left: 6px; }
  .day-week-full { font-size: 12px; color: var(--ink-soft); letter-spacing: 0.15em; text-transform: uppercase; }
  .day-theme { display: inline-block; margin-top: 14px; padding: 6px 12px; background: var(--card); border: 1px solid var(--accent); border-radius: 4px; font-size: 11px; color: var(--accent); letter-spacing: 0.08em; font-weight: 500; }
  
  .alert { margin: 16px 0 24px; padding: 14px 16px; background: #FFF4E8; border-left: 3px solid var(--warning); border-radius: 4px; font-size: 13px; color: var(--ink); line-height: 1.6; }
  .alert-label { display: inline-block; color: var(--warning); font-weight: 700; font-size: 10px; letter-spacing: 0.15em; margin-bottom: 4px; }
  
  .timeline { position: relative; padding-left: 18px; }
  .timeline::before { content: ''; position: absolute; left: 4px; top: 8px; bottom: 8px; width: 1px; background: var(--line); }
  .item { position: relative; padding-bottom: 22px; }
  .item::before { content: ''; position: absolute; left: -18px; top: 7px; width: 9px; height: 9px; border-radius: 50%; background: var(--card); border: 2px solid var(--gold); }
  .item.major::before { background: var(--gold); width: 11px; height: 11px; left: -19px; top: 6px; }
  .item-time { font-family: 'Shippori Mincho', serif; font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 0.05em; margin-bottom: 3px; }
  .item-title { font-size: 15px; font-weight: 500; color: var(--ink); margin-bottom: 2px; line-height: 1.4; }
  .item-detail { font-size: 12px; color: var(--ink-soft); line-height: 1.55; }
  
  .item-links { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .item-link { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; background: var(--card); border: 1px solid var(--line); border-radius: 999px; font-size: 11px; color: var(--accent); text-decoration: none; font-weight: 500; }
  .item-link.map { color: #1A73E8; border-color: #DBE7F7; background: #F4F8FE; }
  .item-link.photo { color: #C45A3F; border-color: #F4DDD5; background: #FCF6F3; }
  .item-link.wiki { color: var(--ink-soft); }
  .item-link.phone { color: var(--accent); background: var(--gold-soft); border-color: var(--gold); }
  .item-link.info { color: var(--accent); background: #E8F1F0; border-color: #B5D4D0; cursor: pointer; }
  button.item-link { font-family: inherit; }
  
  .sub-list { margin-top: 6px; padding: 8px 12px; background: var(--bg); border-left: 2px solid var(--gold); border-radius: 2px; font-size: 12px; color: var(--ink-soft); }
  .sub-list .step { padding: 3px 0; display: flex; gap: 8px; }
  .sub-list .step-num { color: var(--gold); font-family: 'Shippori Mincho', serif; font-weight: 700; flex-shrink: 0; }
  
  /* Per-day memo */
  .day-memo {
    margin: 24px 0;
    padding: 14px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .day-memo-label {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .day-memo-status {
    font-size: 9px;
    color: var(--ink-faint);
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .day-memo textarea {
    width: 100%;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink);
    resize: vertical;
    min-height: 60px;
    outline: none;
  }
  .day-memo textarea::placeholder { color: var(--ink-faint); }
  
  footer { padding: 32px 24px 16px; text-align: center; font-size: 11px; color: var(--ink-faint); margin-top: 24px; }
  footer .hotel { font-family: 'Shippori Mincho', serif; color: var(--ink-soft); font-size: 13px; margin-bottom: 4px; }
  
  .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--line); padding: 8px 12px calc(8px + env(safe-area-inset-bottom)); display: flex; justify-content: center; z-index: 100; }
  .action-inner { display: flex; gap: 6px; width: 100%; max-width: 520px; }
  .action-btn { flex: 1; padding: 10px 8px; background: var(--card); border: 1px solid var(--line); border-radius: 10px; font-family: inherit; font-size: 11px; color: var(--ink); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .action-btn .icon { font-size: 16px; line-height: 1; }
  
  .sheet { position: fixed; inset: 0; background: rgba(26,24,20,0.45); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
  .sheet.open { display: flex; }
  .sheet-content { background: var(--bg); width: 100%; max-width: 520px; border-radius: 18px 18px 0 0; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle { width: 36px; height: 4px; background: var(--ink-faint); border-radius: 2px; margin: 8px auto 0; opacity: 0.4; }
  .sheet-header { padding: 16px 20px 0; display: flex; justify-content: space-between; align-items: center; }
  .sheet-header h3 { font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 500; color: var(--ink); }
  .sheet-close { background: none; border: none; font-size: 22px; color: var(--ink-soft); cursor: pointer; padding: 4px 8px; line-height: 1; }
  .sheet-scroll { overflow-y: auto; padding: 16px 20px 32px; -webkit-overflow-scrolling: touch; }
  
  .sheet-section { margin-bottom: 24px; }
  .sheet-section h4 { font-size: 11px; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; font-weight: 700; }
  
  .booking-card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 14px; margin-bottom: 10px; }
  .booking-card .label { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.1em; text-transform: uppercase; }
  .booking-card .num { font-family: 'Shippori Mincho', serif; font-size: 18px; font-weight: 700; color: var(--ink); margin: 4px 0 8px; display: flex; align-items: center; justify-content: space-between; }
  .copy-btn { background: var(--bg); border: 1px solid var(--line); border-radius: 4px; padding: 4px 10px; font-size: 11px; color: var(--ink-soft); cursor: pointer; font-family: inherit; }
  .copy-btn.copied { background: var(--accent); color: white; border-color: var(--accent); }
  .booking-card .meta { font-size: 12px; color: var(--ink-soft); line-height: 1.6; }
  .booking-card .guess { font-size: 11px; color: var(--ink-faint); margin-top: 6px; font-style: italic; }
  
  .link-list { display: flex; flex-direction: column; gap: 8px; }
  .link-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--card); border: 1px solid var(--line); border-radius: 8px; text-decoration: none; color: var(--ink); }
  .link-row .name { font-size: 13px; font-weight: 500; }
  .link-row .sub { font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
  .link-row .arrow { color: var(--gold); font-size: 14px; }
  
  .check-progress { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; }
  .check-progress-text { font-size: 11px; color: var(--ink-soft); margin-bottom: 8px; display: flex; justify-content: space-between; }
  .check-progress-bar { height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
  .check-progress-fill { height: 100%; background: var(--gold); transition: width 0.3s ease; }
  .check-cat { margin-bottom: 18px; }
  .check-cat-head { font-size: 12px; font-weight: 700; color: var(--ink); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: baseline; }
  .check-cat-count { font-size: 11px; color: var(--ink-faint); font-weight: 500; }
  .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: var(--card); border: 1px solid var(--line); border-radius: 6px; margin-bottom: 4px; cursor: pointer; user-select: none; }
  .check-item:active { transform: scale(0.99); }
  .check-item.done { opacity: 0.55; }
  .check-item.done .check-text { text-decoration: line-through; }
  .check-box { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--ink-faint); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
  .check-item.done .check-box { background: var(--accent); border-color: var(--accent); }
  .check-box::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; opacity: 0; }
  .check-item.done .check-box::after { opacity: 1; }
  .check-text { font-size: 13px; color: var(--ink); line-height: 1.5; }
  .check-note { font-size: 11px; color: var(--ink-faint); display: block; margin-top: 2px; }
  
  .memo-section { margin-bottom: 18px; }
  .memo-section h4 { font-size: 11px; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; font-weight: 700; }
  .memo-section ul { padding-left: 18px; }
  .memo-section li { font-size: 13px; color: var(--ink-soft); line-height: 1.7; }
  
  .global-memo { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
  .global-memo textarea { width: 100%; border: none; background: transparent; font-family: inherit; font-size: 13px; line-height: 1.7; color: var(--ink); resize: vertical; min-height: 200px; outline: none; }
  
  .reset-btn { margin-top: 16px; padding: 8px 12px; background: transparent; border: 1px solid var(--line); border-radius: 6px; font-size: 11px; color: var(--ink-faint); cursor: pointer; font-family: inherit; }
  
  /* Boat schedule */
  .boat-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .boat-card.featured {
    border-color: var(--gold);
    background: linear-gradient(180deg, var(--gold-soft) 0%, var(--card) 60%);
  }
  .boat-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
  }
  .boat-flag {
    flex-shrink: 0;
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .boat-flag.blue { background: #1A73E8; }
  .boat-flag.green { background: #2C5F5D; }
  .boat-flag.gold { background: var(--gold); }
  .boat-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
  }
  .boat-fare {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  .boat-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-top: 1px solid var(--line);
    font-size: 12px;
  }
  .boat-row:first-of-type { border-top: none; padding-top: 0; }
  .boat-row .label { color: var(--ink-soft); }
  .boat-row .value { color: var(--ink); font-weight: 500; text-align: right; }
  .boat-note {
    margin-top: 10px;
    padding: 8px 10px;
    background: var(--bg);
    border-radius: 6px;
    font-size: 11px;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  .boat-note strong { color: var(--ink); }
  
  .boat-tip {
    background: var(--gold-soft);
    border-left: 3px solid var(--gold);
    padding: 12px 14px;
    border-radius: 4px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--ink);
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="trip-name">タイ・バンコク</div>
    <div class="trip-sub">May 6 — 11, 2026</div>
  </header>
  <div class="tabs-wrap"><nav class="tabs" id="tabs"></nav></div>
  <main id="content"></main>
  <footer>
    <div class="hotel">Four Seasons Hotel Bangkok</div>
    <div>at Chao Phraya River</div>
  </footer>
</div>

<div class="action-bar">
  <div class="action-inner">
    <button class="action-btn" onclick="openSheet('boats')"><span class="icon">🛥</span><span>ボート</span></button>
    <button class="action-btn" onclick="openSheet('bookings')"><span class="icon">✈</span><span>予約</span></button>
    <button class="action-btn" onclick="openSheet('checklist')"><span class="icon">☑</span><span>持ち物</span></button>
    <button class="action-btn" onclick="openSheet('memo')"><span class="icon">📝</span><span>メモ</span></button>
    <button class="action-btn" onclick="openSheet('links')"><span class="icon">🔗</span><span>リンク</span></button>
    <button class="action-btn" onclick="openSheet('info')"><span class="icon">ⓘ</span><span>情報</span></button>
  </div>
</div>

<div class="sheet" id="sheet" onclick="if(event.target===this)closeSheet()">
  <div class="sheet-content">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h3 id="sheet-title">予約情報</h3>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-scroll" id="sheet-body"></div>
  </div>
</div>

<script>
// ============= HELPERS =============
const gMap = q => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
const gImg = q => `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(q)}`;
const gWiki = (lang, q) => `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(q)}`;

// ============= DATA =============
const days = [
  {
    date: '2026-05-06', dateShort: '5/6', day: '水', dayFull: 'WEDNESDAY', theme: '到着日',
    items: [
      { time: '11:35', title: '🛫 出発', detail: 'FUK → BKK / TG0649' },
      { time: '15:05', title: '🛬 到着', detail: 'スワンナプーム空港',

      { time: '15:30', title: 'ピックアップ', detail: 'KKday',
        links: [{url:'https://www.kkday.com/ja', text:'KKday', cls:''}] },
      { time: '17:00', title: '🏨 チェックイン', detail: 'フォーシーズンズ・チャオプラヤ', major: true,
        links: [

          {url:'tel:+6620320888', text:'📞 電話', cls:'phone'},

      { time: '19:00', title: '🍽 軽めディナー', detail: 'ICONSIAM or ホテル館内',
        links: [
          {info:'iconsiam', text:'🕐 営業時間', cls:''},
          {url:'https://www.iconsiam.com/', text:'🛍 ICONSIAM', cls:''},
          {url: gMap('ICONSIAM Bangkok'), text:'🗺 地図', cls:'map'},
        ]},
    ]
  },
  {
    date: '2026-05-07', dateShort: '5/7', day: '木', dayFull: 'THURSDAY', theme: '三大寺院＋ディナー',
    alert: 'The Deck by Arun Residence へディナー予約の電話を入れる（18:30 川向きテラス席指定）',
    items: [
      { time: '11:00', title: '🍽 ホテルでブランチ', detail: '' },
      { time: '12:00', title: 'ホテル発', detail: 'ICONSIAM船着場へ' },
      { time: '12:30', title: '🛥 ボート出発', detail: 'チャオプラヤ・ツーリストボート 単発30B',
        links: [
          {info:'tourist-boat-north', text:'🕐 時刻表', cls:''},

        ]},
      { time: '13:00', title: 'ターチャン船着場(N9)', detail: '下船',
        links: [{url: gMap('Tha Chang Pier Bangkok'), text:'🗺 地図', cls:'map'}] },
      { time: '13:15', title: '🏛 王宮 IN', detail: '入口で地図を必ずもらう', major: true,
        sub: [
          { n: '①', t: 'ヤック像 (鬼神像)' },
          { n: '②', t: 'エメラルド仏 — 撮影禁止' },
          { n: '③', t: '黄金仏塔 (プラ・シー・ラタナ・チェディ)' },
          { n: '④', t: 'ラーマーヤナ壁画 — 時計回り' },
          { n: '⑤', t: 'チャクリー宮殿 (外観)' },
        ],
        links: [
          {info:'grand-palace', text:'🕐 開館・料金', cls:''},
          {url: gMap('Grand Palace Bangkok'), text:'🗺 地図', cls:'map'},
          {url: gImg('Wat Phra Kaew Grand Palace Bangkok'), text:'📸 写真', cls:'photo'},
          {url: gWiki('ja','王宮 (バンコク)'), text:'📖 詳細', cls:'wiki'},
        ]
      },
      { time: '14:50', title: '🛌 ワット・ポー IN', detail: '徒歩5分・涅槃仏で有名', major: true,
        sub: [
          { n: '①', t: '涅槃仏 (先に！混雑前)' },
          { n: '②', t: '足裏の螺鈿細工 — 108の図像' },
          { n: '③', t: '4基の仏塔 (プラ・マハー・チェディ)' },
        ],
        links: [
          {info:'wat-pho', text:'🕐 開館・料金', cls:''},
          {url: gMap('Wat Pho Bangkok'), text:'🗺 地図', cls:'map'},
          {url: gImg('Wat Pho Reclining Buddha Bangkok'), text:'📸 写真', cls:'photo'},
          {url: gWiki('ja','ワット・ポー'), text:'📖 詳細', cls:'wiki'},
        ]
      },
      { time: '15:35', title: '☕ カフェ休憩 (60分)', detail: 'The Sixth Floor Cafe',
        links: [{url: gMap('The Sixth Floor Cafe Bangkok Tha Tien'), text:'🗺 地図', cls:'map'}] },
      { time: '16:35', title: 'ターティアン → 渡し舟', detail: '4バーツ',

// ============= RENDER =============
const tabs = document.getElementById('tabs');
const content = document.getElementById('content');
const today = new Date();
const todayStr = today.toISOString().slice(0, 10);

days.forEach((d, i) => {
  const t = document.createElement('button');
  t.className = 'tab';
  if (d.date === todayStr) t.classList.add('today');
  t.innerHTML = `<span class="tab-num">${d.dateShort}</span><span class="tab-week">${d.day}</span>`;
  t.onclick = () => selectDay(i);
  tabs.appendChild(t);
});

days.forEach((d) => {
  const div = document.createElement('section');
  div.className = 'day';
  
  let html = `
    <div class="day-head">
      <div class="day-date">${d.dateShort.replace('/', ' / ')}<small>${d.day}</small></div>
      <div class="day-week-full">${d.dayFull}</div>
      <div class="day-theme">${d.theme}</div>
    </div>
  `;
  
  if (d.alert) {
    html += `<div class="alert"><span class="alert-label">⚠ 要対応</span><br>${d.alert}</div>`;
  }
  
  html += '<div class="timeline">';
  
  d.items.forEach(it => {
    let subHtml = '';
    if (it.sub) {
      subHtml = '<div class="sub-list">' +
        it.sub.map(s => `<div class="step"><span class="step-num">${s.n}</span><span>${s.t}</span></div>`).join('') +
        '</div>';
    }
    let linksHtml = '';
    if (it.links) {
      linksHtml = '<div class="item-links">' +
        it.links.map(l => {
          if (l.info) {
            return `<button onclick="showInfo('${l.info}')" class="item-link info">${l.text}</button>`;
          }
          return `<a href="${l.url}" class="item-link ${l.cls||''}" target="_blank">${l.text}</a>`;
        }).join('') +
        '</div>';
    }
    html += `
      <div class="item${it.major ? ' major' : ''}">
        <div class="item-time">${it.time}</div>
        <div class="item-title">${it.title}</div>
        ${it.detail ? `<div class="item-detail">${it.detail}</div>` : ''}
        ${linksHtml}
        ${subHtml}
      </div>
    `;
  });
  
  html += '</div>';
  
  // Per-day memo
  html += `
    <div class="day-memo">
      <div class="day-memo-label"><span>📝 この日のメモ</span><span class="day-memo-status" id="memo-status-${d.date}">自動保存</span></div>
      <textarea id="memo-${d.date}" placeholder="気づいたこと・予約番号・連絡先・支払い記録など" oninput="saveDayMemo('${d.date}', this)"></textarea>
    </div>
  `;
  
  div.innerHTML = html;
  content.appendChild(div);
});

function selectDay(i) {
  document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
  document.querySelectorAll('.day').forEach((d, idx) => d.classList.toggle('active', idx === i));
  document.querySelectorAll('.tab')[i].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  // Load memo for the selected day
  loadDayMemo(days[i].date);
}

// ============= MEMO =============
function saveDayMemo(date, el) {
  localStorage.setItem(`memo-${date}`, el.value);
  const status = document.getElementById(`memo-status-${date}`);
  if (status) {
    status.textContent = '保存済';
    setTimeout(() => { if(status) status.textContent = '自動保存'; }, 1200);
  }
}
function loadDayMemo(date) {
  const el = document.getElementById(`memo-${date}`);
  if (el) el.value = localStorage.getItem(`memo-${date}`) || '';
}
days.forEach(d => loadDayMemo(d.date));

let initialIdx = days.findIndex(d => d.date === todayStr);
if (initialIdx === -1) {
  if (todayStr < days[0].date) initialIdx = 0;
  else if (todayStr > days[days.length-1].date) initialIdx = days.length - 1;
  else initialIdx = 0;
}
selectDay(initialIdx);

function renderChecklist() {
  const saved = JSON.parse(localStorage.getItem('thai_checklist') || '{}');
  const total = checklist.reduce((s, c) => s + c.items.length, 0);
  const done = Object.values(saved).filter(v => v).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  let html = `
    <div class="check-progress">
      <div class="check-progress-text"><span>準備状況</span><span>${done} / ${total} (${pct}%)</span></div>
      <div class="check-progress-bar"><div class="check-progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  checklist.forEach(cat => {
    const catDone = cat.items.filter(it => saved[it.id]).length;
    html += `<div class="check-cat">
      <div class="check-cat-head"><span>${cat.cat}</span><span class="check-cat-count">${catDone}/${cat.items.length}</span></div>`;
    cat.items.forEach(it => {
      const isDone = saved[it.id] ? 'done' : '';
      html += `<div class="check-item ${isDone}" data-id="${it.id}">
        <div class="check-box"></div>
        <div class="check-text">${it.text}${it.note ? `<span class="check-note">${it.note}</span>` : ''}</div>
      </div>`;
    });
    html += '</div>';
  });
  html += '<button class="reset-btn" onclick="resetChecklist()">すべてリセット</button>';
  return html;
}

function bindChecklist() {
  document.querySelectorAll('.check-item').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.id;
      const saved = JSON.parse(localStorage.getItem('thai_checklist') || '{}');
      saved[id] = !saved[id];
      localStorage.setItem('thai_checklist', JSON.stringify(saved));
      sheetBody.innerHTML = renderChecklist();
      bindChecklist();
    };
  });
}
function resetChecklist() {
  if (confirm('チェックをすべてリセットしますか？')) {
    localStorage.removeItem('thai_checklist');
    sheetBody.innerHTML = renderChecklist();
    bindChecklist();
  }
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'コピー済';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 1500);
  });
}
